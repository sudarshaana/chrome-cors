<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CORS Bypass Validator</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --primary: #6366f1;
      --text: #f8fafc;
      --error: #ef4444;
      --success: #10b981;
    }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background-color: var(--card);
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
      width: 90%;
      max-width: 600px;
      text-align: center;
    }
    h1 { margin-top: 0; background: linear-gradient(to right, #6366f1, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    button {
      background-color: var(--primary);
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 1rem;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4); }
    #result-container {
      margin-top: 1.5rem;
      text-align: left;
      background: #000;
      padding: 1rem;
      border-radius: 0.5rem;
      font-family: monospace;
      font-size: 0.8rem;
      height: 200px;
      overflow-y: auto;
      border: 1px solid #334155;
    }
    .status { font-weight: bold; margin-bottom: 0.5rem; }
    .status-fail { color: var(--error); }
    .status-pass { color: var(--success); }
  </style>
</head>
<body>
  <div class="card">
    <h1>CORS Bypass Validator</h1>
    <p>Test if the extension is correctly bypassing CORS restrictions by fetching <code>example.com</code>.</p>

    <button id="test-btn">Run Fetch Test</button>

    <div id="result-container">
      <div id="status-line" class="status">Waiting for test...</div>
      <div id="log-output"></div>
    </div>
  </div>

  <script>
    const testBtn = document.getElementById('test-btn');
    const statusLine = document.getElementById('status-line');
    const logOutput = document.getElementById('log-output');

    testBtn.onclick = async () => {
      logOutput.textContent = '';
      statusLine.textContent = 'Testing...';
      statusLine.className = 'status';

      try {
        logOutput.textContent += '> Sending request to http://172.16.50.14\n';
        const start = Date.now();
        const response = await fetch('http://172.16.50.14', { mode: 'cors' });
        const time = Date.now() - start;

        logOutput.textContent += `> Response received in ${time}ms\n`;
        logOutput.textContent += `> Status: ${response.status} ${response.statusText}\n`;

        const text = await response.text();
        logOutput.textContent += `> Data snippet: ${text.substring(0, 200)}...\n`;

        statusLine.textContent = 'PASS: CORS Bypass is working!';
        statusLine.classList.add('status-pass');
      } catch (err) {
        logOutput.textContent += `> Error: ${err.message}\n`;
        logOutput.textContent += `> Likely cause: Extension is disabled or not granting headers.\n`;
        statusLine.textContent = 'FAIL: CORS Bypass failed.';
        statusLine.classList.add('status-fail');
      }
    };
  </script>
</body>
</html>
